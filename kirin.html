<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麒麟芯片科普</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg-card:#131313;--border:#2a2a2a;--text-muted:#7a7570;--red:#c0392b;--red-glow:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");opacity:.03;pointer-events:none;z-index:1}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.7) 100%);pointer-events:none;z-index:0}

.site-nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,10,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center}
.site-nav .inner{max-width:1200px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:400;color:var(--red);transition:all .25s;padding:4px 10px 4px 6px;border-radius:18px;border:1px solid rgba(192,57,43,.25);background:rgba(192,57,43,.06);text-decoration:none}
.nav-back:hover{background:rgba(192,57,43,.14);border-color:rgba(231,76,60,.45);color:var(--red-glow)}
.nav-back svg{width:12px;height:12px;transition:transform .25s}
.nav-back:hover svg{transform:translateX(-2px)}
.site-nav .brand{font-family:'Space Mono',monospace;font-weight:700;font-size:.85rem;color:var(--red)}
.site-nav .links{display:flex;gap:4px;flex-wrap:wrap}
.site-nav .links a{font-size:10px;font-family:'Space Mono',monospace;padding:4px 8px;border-radius:5px;color:var(--text-muted);transition:all .2s;text-transform:uppercase;text-decoration:none}
.site-nav .links a:hover{color:#fff;background:rgba(255,255,255,.06)}
.site-nav .links a.active{background:rgba(192,57,43,.15);color:var(--red)}

.main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;padding:52px 24px 0}
.container{text-align:center}
.title{font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:clamp(4rem,15vw,12rem);color:var(--red);letter-spacing:.12em;line-height:1.1;text-shadow:0 0 40px rgba(192,57,43,.4),0 0 120px rgba(192,57,43,.15);animation:breathe 4s ease-in-out infinite,fadeReveal 1.5s ease-out forwards;opacity:0;user-select:none}
@keyframes fadeReveal{0%{opacity:0;transform:scale(.9);filter:blur(8px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
@keyframes breathe{0%,100%{text-shadow:0 0 40px rgba(192,57,43,.4),0 0 120px rgba(192,57,43,.15)}50%{text-shadow:0 0 60px rgba(231,76,60,.6),0 0 180px rgba(192,57,43,.25)}}
.line{width:0;height:1px;background:var(--red);margin:2rem auto;animation:lineExpand 1s ease-out 1s forwards;box-shadow:0 0 10px rgba(192,57,43,.5)}
@keyframes lineExpand{to{width:60vw}}
.cursor-hint{display:block;margin-top:2rem;font-size:11px;font-family:'Space Mono',monospace;color:#4a4640;letter-spacing:.1em;animation:fadeReveal 2s ease-out 2s forwards;opacity:0}

footer{padding:40px 24px;text-align:center;border-top:1px solid var(--border);position:relative;z-index:2}
footer p{font-size:11px;font-family:'Space Mono',monospace;color:#4a4640}

#egg-popup{position:fixed;bottom:20px;right:20px;z-index:9000;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;max-width:280px;font-size:12px;color:var(--text-muted);line-height:1.7;opacity:0;transform:translateY(10px);transition:all .4s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#egg-popup.show{opacity:1;transform:translateY(0);pointer-events:auto}
</style>
</head>
<body>

<nav class="site-nav">
<div class="inner">
  <div style="display:flex;align-items:center;gap:12px">
    <a href="性能.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span>返回</span>
    </a>
    <span class="brand">🤫 麒麟</span>
  </div>
  <div class="links"><a href="snapdragon.html">骁龙</a><a href="dimensity.html">天玑</a><a href="apple.html">苹果</a><a href="samsung.html">三星</a><a href="xuanjie.html">玄戒</a><a href="kirin.html" class="active">麒麟</a></div>
</div>
</nav>

<div class="main">
  <div class="container">
    <div class="title">不敢说</div>
    <div class="line"></div>
    <span class="cursor-hint">// CLASSIFIED — 此处省略一万字 //</span>
  </div>
</div>

<footer><p>麒麟芯片科普 · 2026 · [内容已折叠] · 有些事，懂的都懂</p></footer>

<div id="egg-popup"></div>
<script>
const eggs=["🤫 麒麟：不敢说","🤐 有些事，懂的都懂","🔒 此处省略一万字","🫣 问就是不知道","📡 信号很好，其他不能说","🇨🇳 反正就是很强，但不能细说"];
let eggT;function showEgg(){const el=document.getElementById('egg-popup');el.textContent=eggs[Math.floor(Math.random()*eggs.length)];el.classList.add('show');clearTimeout(eggT);eggT=setTimeout(()=>el.classList.remove('show'),4000)}
setTimeout(showEgg,10000);setInterval(showEgg,50000+Math.random()*30000);
</script>
</body>
</html>
